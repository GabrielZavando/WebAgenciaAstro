name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Type Check and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check (astro check)
        run: pnpm exec astro check

      - name: Build Project
        run: pnpm build
        env:
          # Variables mínimas para que el build no falle por falta de env vars
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || 'https://nestjs-api-201828783555.us-central1.run.app' }}
          PUBLIC_FIREBASE_PROJECT_ID: placeholder
          PUBLIC_FIREBASE_API_KEY: placeholder
          PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
          PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID: placeholder
          PUBLIC_FIREBASE_APP_ID: placeholder
          PUBLIC_TURNSTILE_SITE_KEY: placeholder
          PUBLIC_GTM_ID: placeholder
