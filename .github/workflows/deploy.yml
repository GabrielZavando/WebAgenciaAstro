name: Deploy to Cloud Run

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: agenciadigital-445923
      REGION: us-central1
      SERVICE_NAME: landing-page
      REGISTRY: us-central1-docker.pkg.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/201828783555/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@agenciadigital-445923.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Read secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            PUBLIC_API_URL:agenciadigital-445923/LANDING_PUBLIC_API_URL
            PUBLIC_FIREBASE_API_KEY:agenciadigital-445923/LANDING_FIREBASE_API_KEY
            PUBLIC_FIREBASE_AUTH_DOMAIN:agenciadigital-445923/LANDING_FIREBASE_AUTH_DOMAIN
            PUBLIC_FIREBASE_PROJECT_ID:agenciadigital-445923/LANDING_FIREBASE_PROJECT_ID
            PUBLIC_FIREBASE_STORAGE_BUCKET:agenciadigital-445923/LANDING_FIREBASE_STORAGE_BUCKET
            PUBLIC_FIREBASE_MESSAGING_SENDER_ID:agenciadigital-445923/LANDING_FIREBASE_MESSAGING_SENDER_ID
            PUBLIC_FIREBASE_APP_ID:agenciadigital-445923/LANDING_FIREBASE_APP_ID
            PUBLIC_TURNSTILE_SITE_KEY:agenciadigital-445923/LANDING_TURNSTILE_SITE_KEY

      - name: Build and Push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build \
            --build-arg PUBLIC_API_URL="${{ steps.secrets.outputs.PUBLIC_API_URL }}" \
            --build-arg PUBLIC_API_BASE_URL="${{ steps.secrets.outputs.PUBLIC_API_URL }}" \
            --build-arg PUBLIC_FIREBASE_API_KEY="${{ steps.secrets.outputs.PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg PUBLIC_FIREBASE_AUTH_DOMAIN="${{ steps.secrets.outputs.PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg PUBLIC_FIREBASE_PROJECT_ID="${{ steps.secrets.outputs.PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg PUBLIC_FIREBASE_STORAGE_BUCKET="${{ steps.secrets.outputs.PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ steps.secrets.outputs.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg PUBLIC_FIREBASE_APP_ID="${{ steps.secrets.outputs.PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg PUBLIC_TURNSTILE_SITE_KEY="${{ steps.secrets.outputs.PUBLIC_TURNSTILE_SITE_KEY }}" \
            -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars NODE_ENV=production \
            --set-secrets "FIREBASE_SERVICE_ACCOUNT=FIREBASE_SERVICE_ACCOUNT:latest" \
            --min-instances=0 \
            --max-instances=5 \
            --memory=512Mi \
            --cpu=1 \
            --port=8080 \
            --timeout=60
