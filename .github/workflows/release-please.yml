on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Authenticate to Google Cloud
        if: ${{ steps.release.outputs.release_created }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/201828783555/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@agenciadigital-445923.iam.gserviceaccount.com

      - name: Get OpenAI API Key from Secret Manager
        if: ${{ steps.release.outputs.release_created }}
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            OPENAI_API_KEY:agenciadigital-445923/OPENAI_API_KEY

      - name: Enrich Release Notes with AI
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseTag = '${{ steps.release.outputs.tag_name }}';
            const originalBody = `${{ steps.release.outputs.body }}`;

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [
                  {
                    role: 'system',
                    content: `Eres un experto técnico que mejora notas de release de software.
                    Tu tarea es tomar las notas de release generadas automáticamente y mejorarlas:
                    - Agrupa los cambios por categoría (Features, Bug Fixes, Mejoras, etc.)
                    - Escribe descripciones claras y orientadas al usuario final
                    - Mantén un tono profesional pero amigable
                    - Usa emojis para hacer las notas más legibles
                    - Responde en español
                    - Conserva todos los links y referencias a PRs y commits`
                  },
                  {
                    role: 'user',
                    content: `Mejora estas notas de release para la versión ${releaseTag}:\n\n${originalBody}`
                  }
                ],
                max_tokens: 1000,
                temperature: 0.5
              })
            });

            const data = await response.json();
            const enrichedBody = data.choices[0].message.content;

            const [owner, repo] = '${{ github.repository }}'.split('/');
            const releaseId = '${{ steps.release.outputs.id }}';

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: parseInt(releaseId),
              body: enrichedBody
            });

            console.log(`Release ${releaseTag} actualizado con notas enriquecidas.`);
        env:
          OPENAI_API_KEY: ${{ steps.secrets.outputs.OPENAI_API_KEY }}
